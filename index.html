<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1C1C1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Slipstream">
  <title>Slipstream</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- SCREEN: Home -->
  <div id="screen-home" class="screen active">
    <div class="home-wrap">
      <div class="wordmark">Slipstream</div>
      <div class="tagline">Run with anyone. Anywhere. Any time.</div>
      <div class="home-actions">
        <button class="btn btn-primary" id="btn-import">Import a Garmin Run</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Import GPX -->
  <div id="screen-import" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="back-import">&#8592;</button>
      <span class="screen-title">Import Run</span>
    </div>
    <div class="screen-body">
      <p class="instructions">Export your run from Garmin Connect as a GPX file, then import it here.</p>
      <div class="file-drop" id="file-drop">
        <input type="file" id="gpx-file-input" accept=".gpx" style="position:absolute;width:1px;height:1px;opacity:0;">
        <span class="file-drop-icon">+</span>
        <span class="file-drop-label">Tap to select GPX file</span>
      </div>
      <div id="import-error" class="error-msg hidden"></div>
      <div id="import-result" class="result-card hidden"></div>
      <div id="share-row" class="share-row hidden">
        <input type="text" id="run-name-input" class="text-input" placeholder="Name this run…" maxlength="40">
        <button class="btn btn-primary" id="btn-share" disabled>Share</button>
      </div>
    </div>
  </div>

  <!-- SCREEN: Ghost Preview -->
  <div id="screen-preview" class="screen">
    <div class="screen-header">
      <button class="btn-back" id="back-preview">&#8592;</button>
      <span class="screen-title">Ghost Run</span>
    </div>
    <div class="screen-body">
      <p class="instructions">You've been challenged. Here's what you're up against.</p>
      <div id="preview-card" class="result-card"></div>
      <div id="preview-error" class="error-msg hidden"></div>
      <button class="btn btn-primary" id="btn-run-ghost">Run with this Ghost</button>
    </div>
  </div>

  <!-- SCREEN: Active Run -->
  <div id="screen-run" class="screen">
    <div id="countdown-overlay" class="countdown-overlay hidden">
      <div id="countdown-number" class="countdown-number">5</div>
    </div>
    <div class="stats-row">
      <div class="stat-block">
        <div class="stat-value" id="stat-pace">--:--</div>
        <div class="stat-label">PACE /km</div>
      </div>
      <div class="stat-block">
        <div class="stat-value" id="stat-time">0:00</div>
        <div class="stat-label">TIME</div>
      </div>
      <div class="stat-block">
        <div class="stat-value" id="stat-dist">0.00</div>
        <div class="stat-label">KM</div>
      </div>
    </div>
    <div class="ghost-ref" id="ghost-ref-pace">--:--</div>
    <div class="run-controls">
      <button class="btn btn-secondary" id="btn-pause">⏸ Pause</button>
      <button class="btn btn-danger" id="btn-stop">Stop</button>
    </div>
  </div>

  <!-- SCREEN: Summary -->
  <div id="screen-summary" class="screen">
    <div id="undo-banner" class="undo-banner hidden">
      Run ended — <span id="btn-undo" class="undo-link">Undo</span>
    </div>
    <div class="screen-header">
      <span class="screen-title">Run Complete</span>
    </div>
    <div class="screen-body">
      <div id="summary-result" class="summary-result"></div>
      <div id="summary-grid" class="result-card"></div>
      <button class="btn btn-primary" id="btn-run-again">Run Again</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
